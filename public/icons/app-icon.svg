<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Space Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#05050A" />
    </linearGradient>

    <!-- Blue Planet 3D Gradient (Matches game's radial gradient) -->
    <radialGradient id="bluePlanet" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Blue Glow Filter -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Red Planet 3D Gradient (Matches game's radial gradient) -->
    <radialGradient id="redPlanet" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Red Glow Filter -->
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Ship shapes (Matching game coordinates scaled up by ~1.5x) -->
    <!-- (5,0), (-4,4), (-2,0), (-4,-4) -> scaled: (7.5,0), (-6,6), (-3,0), (-6,-6) -->
    <g id="blueShipBase">
      <polygon points="7.5,0 -6,-6 -3,0 -6,6" fill="#3b82f6" filter="url(#blueGlow)" />
      <polygon points="7.5,0 -6,-6 -3,0 -6,6" fill="#60a5fa" />
    </g>

    <g id="redShipBase">
      <polygon points="7.5,0 -6,-6 -3,0 -6,6" fill="#ef4444" filter="url(#redGlow)" />
      <polygon points="7.5,0 -6,-6 -3,0 -6,6" fill="#f87171" />
    </g>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- ========================================== -->
  <!-- BLUE PLAYER CAPITAL (Center)               -->
  <!-- ========================================== -->
  <g transform="translate(180, 320)">
    <!-- Actual 3D Sphere Base -->
    <circle cx="0" cy="0" r="60" fill="url(#bluePlanet)" filter="url(#blueGlow)" />
    <!-- Atmosphere Ring -->
    <circle cx="0" cy="0" r="64" fill="none" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.3" />
  </g>

  <!-- ========================================== -->
  <!-- RED ENEMY PLANET (Top Right)               -->
  <!-- ========================================== -->
  <g transform="translate(400, 112)">
    <!-- Actual 3D Sphere Base -->
    <circle cx="0" cy="0" r="40" fill="url(#redPlanet)" filter="url(#redGlow)" />
    <!-- Atmosphere Ring -->
    <circle cx="0" cy="0" r="43" fill="none" stroke="#ef4444" stroke-width="2" stroke-opacity="0.3" />
  </g>


  <!-- ========================================== -->
  <!-- RED DEFENSIVE SWARM (Orbiting Top-Right)   -->
  <!-- ========================================== -->
  <g>
    <!-- Orbiting red ships pointed in a circle -->
    <use href="#redShipBase" x="400" y="47" transform="rotate(0 400 47)" />
    <use href="#redShipBase" x="450" y="65" transform="rotate(45 450 65)" />
    <use href="#redShipBase" x="465" y="112" transform="rotate(90 465 112)" />
    <use href="#redShipBase" x="445" y="155" transform="rotate(135 445 155)" />
    <use href="#redShipBase" x="380" y="175" transform="rotate(180 380 175)" />
    <use href="#redShipBase" x="345" y="145" transform="rotate(225 345 145)" />
    <use href="#redShipBase" x="335" y="95" transform="rotate(270 335 95)" />
    <use href="#redShipBase" x="360" y="60" transform="rotate(315 360 60)" />

    <!-- Inner orbit -->
    <use href="#redShipBase" x="400" y="70" transform="rotate(25 400 70)" />
    <use href="#redShipBase" x="435" y="130" transform="rotate(115 435 130)" />
    <use href="#redShipBase" x="360" y="130" transform="rotate(205 360 130)" />
  </g>

  <!-- ========================================== -->
  <!-- BLUE DEFENSIVE SWARM (Orbiting Center)     -->
  <!-- ========================================== -->
  <g>
    <!-- Orbiting blue ships pointed in a circle -->
    <use href="#blueShipBase" x="180" y="225" transform="rotate(-90 180 225)" />
    <use href="#blueShipBase" x="250" y="250" transform="rotate(-45 250 250)" />
    <use href="#blueShipBase" x="285" y="320" transform="rotate(0 285 320)" />
    <use href="#blueShipBase" x="255" y="390" transform="rotate(45 255 390)" />
    <use href="#blueShipBase" x="180" y="420" transform="rotate(90 180 420)" />
    <use href="#blueShipBase" x="105" y="395" transform="rotate(135 105 395)" />
    <use href="#blueShipBase" x="80" y="325" transform="rotate(180 80 325)" />
    <use href="#blueShipBase" x="105" y="255" transform="rotate(225 105 255)" />

    <!-- Inner orbit -->
    <use href="#blueShipBase" x="180" y="245" transform="rotate(-75 180 245)" />
    <use href="#blueShipBase" x="235" y="275" transform="rotate(-15 235 275)" />
    <use href="#blueShipBase" x="255" y="340" transform="rotate(60 255 340)" />
    <use href="#blueShipBase" x="220" y="380" transform="rotate(120 220 380)" />
    <use href="#blueShipBase" x="145" y="385" transform="rotate(165 145 385)" />
    <use href="#blueShipBase" x="110" y="310" transform="rotate(230 110 310)" />
  </g>

  <!-- ========================================== -->
  <!-- BLUE ATTACKING SWARM (Center -> Top-Right) -->
  <!-- ========================================== -->
  <!-- These ships are angled towards the red base (approx -45 degrees) -->
  <g>
    <!-- Trailing column -->
    <use href="#blueShipBase" x="250" y="210" transform="rotate(-45 250 210)" />
    <use href="#blueShipBase" x="225" y="195" transform="rotate(-45 225 195)" />
    <use href="#blueShipBase" x="270" y="225" transform="rotate(-45 270 225)" />

    <!-- Mid column 1 -->
    <use href="#blueShipBase" x="280" y="180" transform="rotate(-45 280 180)" />
    <use href="#blueShipBase" x="255" y="160" transform="rotate(-45 255 160)" />
    <use href="#blueShipBase" x="300" y="200" transform="rotate(-45 300 200)" />
    <use href="#blueShipBase" x="310" y="170" transform="rotate(-45 310 170)" />

    <!-- Mid column 2 -->
    <use href="#blueShipBase" x="325" y="150" transform="rotate(-45 325 150)" />
    <use href="#blueShipBase" x="300" y="130" transform="rotate(-45 300 130)" />
    <use href="#blueShipBase" x="345" y="165" transform="rotate(-45 345 165)" />
    <use href="#blueShipBase" x="280" y="125" transform="rotate(-45 280 125)" />

    <!-- Vanguard (Engaging) -->
    <use href="#blueShipBase" x="350" y="120" transform="rotate(-45 350 120)" />
    <use href="#blueShipBase" x="365" y="145" transform="rotate(-45 365 145)" />
    <use href="#blueShipBase" x="335" y="95"  transform="rotate(-45 335 95)" />
    <use href="#blueShipBase" x="315" y="105" transform="rotate(-45 315 105)" />
  </g>
</svg>
