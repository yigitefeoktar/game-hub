  <rect width="512" height="512" fill="#050a0f" opacity="0.18" />
  <text
    x="256"
    y="304"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Segoe UI Symbol, DejaVu Sans, Symbola, Arial, sans-serif"
    font-size="260"
    fill="#3b82f6"
    filter="url(#blue-glow)">&#9823;&#65038;</text>
  <text
    x="256"
    y="406"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="104"
    font-weight="900"
    fill="#ffffff"
    filter="url(#cyan-glow)"
    letter-spacing="0">100</text>
  <text
    x="260"
    y="406"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Inter, system-ui, sans-serif"
    font-size="104"
    font-weight="900"
    fill="#00f0ff"
    opacity="0.45"
    letter-spacing="0">100</text>
